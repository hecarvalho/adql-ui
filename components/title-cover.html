<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADQL UI — Title Cover</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../css/core/core.css" />
  <link rel="stylesheet" href="../css/components/title-cover.css" />
</head>
<body>
  <main class="adql-canvas tc-canvas">
    <section id="titleCoverPoster" class="tc-poster tc-composition-editorial">
      <div class="tc-background" aria-hidden="true">
        <div class="tc-glow"></div>
        <div class="tc-grid"></div>
        <div class="tc-pitch-lines">
          <span class="tc-pitch-line tc-pitch-line-a"></span>
          <span class="tc-pitch-line tc-pitch-line-b"></span>
          <span class="tc-pitch-circle"></span>
          <span class="tc-pitch-box"></span>
        </div>
        <div class="tc-gold-arc"></div>
        <div id="tcBigCode" class="tc-big-code">01</div>
        <div class="tc-question-mark">?</div>
      </div>

      <header class="tc-header">
        <div id="tcKickerWrap" class="tc-kicker-wrap">
          <span class="tc-kicker-line"></span>
          <p id="tcKicker" class="tc-kicker">Pós-jogo</p>
        </div>

        <div class="tc-index">
          <span>ADQL UI</span>
          <strong id="tcCode">C-07</strong>
        </div>
      </header>

      <section class="tc-content">
        <div class="tc-title-frame">
          <h1 id="tcTitle" class="tc-title">Escócia 0 × 3 Brasil</h1>
        </div>

        <div class="tc-subtitle-wrap">
          <span class="tc-subtitle-rule"></span>
          <p id="tcSubtitle" class="tc-subtitle">Copa do Mundo 2026 • Grupo C<br>24 de junho • Hard Rock Stadium, Miami Gardens</p>
        </div>
      </section>

      <footer class="tc-footer">
        <span>Além das quatro linhas</span>
        <span>Henrique Carvalho</span>
      </footer>
    </section>
  </main>

  <script src="../data/title-cover.js"></script>
  <script src="../js/title-cover.js"></script>
</body>
</html>
