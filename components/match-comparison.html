<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Match Comparison</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#0D0D0D;

    color:#F4F4F4;

    font-family:Inter,Arial,sans-serif;

    display:flex;

    justify-content:center;

    padding:60px;

}

.container{

    width:900px;

    background:#171717;

    border:1px solid #2A2A2A;

    border-radius:20px;

    padding:40px;

}

.label{

    color:#F2B705;

    font-size:12px;

    letter-spacing:2px;

    text-transform:uppercase;

    margin-bottom:10px;

}

h1{

    font-size:42px;

    margin-bottom:8px;

}

.subtitle{

    color:#9B9B9B;

    margin-bottom:35px;

}

.metric{

    margin-bottom:28px;

}

.metric-title{

    font-size:13px;

    color:#BFBFBF;

    margin-bottom:8px;

    letter-spacing:1px;

    text-transform:uppercase;

}

.row{

    display:grid;

    grid-template-columns:70px 1fr 70px;

    gap:16px;

    align-items:center;

}

.value{

    font-weight:700;

    font-size:18px;

}

.track{

    height:12px;

    background:#2A2A2A;

    border-radius:999px;

    overflow:hidden;

    position:relative;

}

.fill{

    height:100%;

    background:#F2B705;

    border-radius:999px;

}

.divider{

    height:1px;

    background:#2A2A2A;

    margin:24px 0;

}

.footer{

    margin-top:35px;

    color:#777;

    font-size:13px;

}

</style>

</head>

<body>

<div class="container">

<div class="label">

MATCH COMPARISON

</div>

<h1>

Brasil × Japão

</h1>

<div class="subtitle">

Eliminatórias da Copa do Mundo • 10 Jun 2026

</div>

<div class="metric">

<div class="metric-title">

Posse

</div>

<div class="row">

<div class="value">

62%

</div>

<div class="track">

<div class="fill" style="width:62%;"></div>

</div>

<div class="value" style="text-align:right;">

38%

</div>

</div>

</div>

<div class="divider"></div>

<div class="metric">

<div class="metric-title">

Expected Goals (xG)

</div>

<div class="row">

<div class="value">

2.12

</div>

<div class="track">

<div class="fill" style="width:89%;"></div>

</div>

<div class="value" style="text-align:right;">

0.26

</div>

</div>

</div>

<div class="divider"></div>

<div class="metric">

<div class="metric-title">

Finalizações

</div>

<div class="row">

<div class="value">

19

</div>

<div class="track">

<div class="fill" style="width:79%;"></div>

</div>

<div class="value" style="text-align:right;">

5

</div>

</div>

</div>

<div class="divider"></div>

<div class="metric">

<div class="metric-title">

Passes Certos

</div>

<div class="row">

<div class="value">

652

</div>

<div class="track">

<div class="fill" style="width:92%;"></div>

</div>

<div class="value" style="text-align:right;">

418

</div>

</div>

</div>

<div class="divider"></div>

<div class="metric">

<div class="metric-title">

Recepções no Terço Final

</div>

<div class="row">

<div class="value">

250

</div>

<div class="track">

<div class="fill" style="width:100%;"></div>

</div>

<div class="value" style="text-align:right;">

81

</div>

</div>

</div>

<div class="footer">

Além das quatro linhas • Henrique Carvalho

</div>

</div>

</body>

</html>
