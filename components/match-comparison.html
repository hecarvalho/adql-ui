<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    ADQL UI — Comparativo Estatístico
  </title>


  <!-- TIPOGRAFIA -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />


  <!-- ADQL CORE -->

  <link
    rel="stylesheet"
    href="../css/core/core.css"
  />


  <!-- COMPONENTE -->

  <link
    rel="stylesheet"
    href="../css/components/match-comparison.css"
  />

</head>


<body>

  <main class="adql-canvas">


    <section class="mc-poster">


      <!-- ==================================================
           ELEMENTOS GRÁFICOS DE FUNDO
      =================================================== -->


      <div
        class="mc-background"
        aria-hidden="true"
      >


        <div
          class="mc-dot-grid mc-dot-grid-top"
        ></div>


        <div
          class="mc-dot-grid mc-dot-grid-bottom"
        ></div>


        <!-- CAMPO EM MARCA D'ÁGUA -->

        <svg
          class="mc-bg-pitch"
          viewBox="0 0 720 430"
        >

          <rect
            x="20"
            y="20"
            width="680"
            height="390"
          />

          <line
            x1="360"
            y1="20"
            x2="360"
            y2="410"
          />

          <circle
            cx="360"
            cy="215"
            r="58"
          />

          <circle
            cx="360"
            cy="215"
            r="3"
          />

          <rect
            x="20"
            y="135"
            width="95"
            height="160"
          />

          <rect
            x="605"
            y="135"
            width="95"
            height="160"
          />

          <rect
            x="20"
            y="175"
            width="38"
            height="80"
          />

          <rect
            x="662"
            y="175"
            width="38"
            height="80"
          />

          <path
            d="M150 120 C240 75 315 110 390 170"
          />

          <path
            d="M255 300 C330 250 420 245 520 165"
          />

          <circle cx="150" cy="120" r="6" />
          <circle cx="245" cy="105" r="6" />
          <circle cx="390" cy="170" r="6" />
          <circle cx="255" cy="300" r="6" />
          <circle cx="420" cy="245" r="6" />
          <circle cx="520" cy="165" r="6" />

        </svg>


        <!-- REDE DE CONEXÕES -->

        <svg
          class="mc-bg-network"
          viewBox="0 0 260 220"
        >

          <line x1="35" y1="45" x2="115" y2="28" />
          <line x1="115" y1="28" x2="205" y2="62" />
          <line x1="35" y1="45" x2="72" y2="130" />
          <line x1="72" y1="130" x2="160" y2="110" />
          <line x1="160" y1="110" x2="205" y2="62" />
          <line x1="72" y1="130" x2="122" y2="190" />
          <line x1="122" y1="190" x2="220" y2="164" />
          <line x1="160" y1="110" x2="220" y2="164" />

          <circle cx="35" cy="45" r="7" />
          <circle cx="115" cy="28" r="7" />
          <circle cx="205" cy="62" r="7" />
          <circle cx="72" cy="130" r="7" />
          <circle cx="160" cy="110" r="7" />
          <circle cx="122" cy="190" r="7" />
          <circle cx="220" cy="164" r="7" />

        </svg>


        <!-- GRÁFICO DE TENDÊNCIA -->

        <svg
          class="mc-bg-chart"
          viewBox="0 0 300 190"
        >

          <line x1="28" y1="158" x2="280" y2="158" />
          <line x1="28" y1="24" x2="28" y2="158" />

          <line x1="28" y1="118" x2="280" y2="118" />
          <line x1="28" y1="78" x2="280" y2="78" />


          <path
            class="mc-chart-gold"
            d="M36 134 L88 112 L142 84 L198 58 L260 30"
          />


          <path
            class="mc-chart-blue"
            d="M36 150 L88 137 L142 119 L198 92 L260 69"
          />


          <circle
            class="mc-chart-gold-node"
            cx="36"
            cy="134"
            r="5"
          />

          <circle
            class="mc-chart-gold-node"
            cx="88"
            cy="112"
            r="5"
          />

          <circle
            class="mc-chart-gold-node"
            cx="142"
            cy="84"
            r="5"
          />

          <circle
            class="mc-chart-gold-node"
            cx="198"
            cy="58"
            r="5"
          />

          <circle
            class="mc-chart-gold-node"
            cx="260"
            cy="30"
            r="5"
          />

        </svg>


      </div>



      <!-- ==================================================
           CABEÇALHO
      =================================================== -->


      <header class="mc-header">


        <div class="mc-title-area">


          <div class="mc-title-content">


            <p class="mc-kicker">

              Comparativo estatístico

            </p>


            <h1 class="mc-title">


              <span id="homeTitle">

                França

              </span>


              <em>

                ×

              </em>


              <span id="awayTitle">

                Marrocos

              </span>


            </h1>


            <p
              id="matchSubtitle"
              class="mc-subtitle"
            >

              Quartas de final • Copa do Mundo 2026

            </p>


          </div>



          <!-- RADAR -->


          <div class="mc-radar-block">


            <span class="mc-radar-label">

              Perfil do jogo

            </span>


            <svg
              class="mc-radar"
              viewBox="0 0 220 220"
              aria-hidden="true"
            >


              <polygon
                class="mc-radar-grid"
                points="110,24 184,67 184,153 110,196 36,153 36,67"
              />


              <polygon
                class="mc-radar-grid"
                points="110,52 160,82 160,138 110,168 60,138 60,82"
              />


              <polygon
                class="mc-radar-grid"
                points="110,78 138,94 138,126 110,142 82,126 82,94"
              />


              <line
                x1="110"
                y1="24"
                x2="110"
                y2="196"
              />


              <line
                x1="36"
                y1="67"
                x2="184"
                y2="153"
              />


              <line
                x1="184"
                y1="67"
                x2="36"
                y2="153"
              />


              <polygon
                class="mc-radar-home"
                points="110,42 170,78 156,148 110,178 58,145 68,78"
              />


              <polygon
                class="mc-radar-away"
                points="110,70 146,91 140,132 110,151 77,132 82,92"
              />


            </svg>


            <div class="mc-radar-legend">


              <span>

                <i class="home"></i>

                França

              </span>


              <span>

                <i class="away"></i>

                Marrocos

              </span>


            </div>


          </div>


        </div>


      </header>



      <!-- ==================================================
           EQUIPES
      =================================================== -->


      <div class="mc-teams">


        <span id="homeName">

          França

        </span>


        <span class="mc-center-mark">

          Dados comparativos

        </span>


        <span id="awayName">

          Marrocos

        </span>


      </div>



      <!-- ==================================================
           MÉTRICAS
      =================================================== -->


      <section
        id="metrics"
        class="mc-metrics"
      ></section>



      <!-- ==================================================
           RODAPÉ
      =================================================== -->


      <footer class="mc-footer">


        <div>

          <strong>

            Fonte

          </strong>


          <span>

            FIFA • FBref • Dados próprios

          </span>

        </div>



        <div class="mc-footer-brand">

          <strong>

            Além das quatro linhas

          </strong>


          <span>

            Henrique Carvalho

          </span>

        </div>


      </footer>



      <!-- ASSINATURA GRÁFICA -->


      <div
        class="mc-wave"
        aria-hidden="true"
      ></div>


      <div
        class="mc-wave-dots"
        aria-hidden="true"
      ></div>


    </section>


  </main>


  <script src="../js/match-comparison.js"></script>


</body>

</html>
