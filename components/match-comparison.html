<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ADQL UI — Match Comparison</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../css/core/core.css" />
  <link rel="stylesheet" href="../css/components/match-comparison.css" />
</head>

<body>
  <main class="adql-canvas">
    <section class="mc-poster">

      <div class="mc-background" aria-hidden="true">
        <div class="mc-dot-grid mc-dot-grid-top"></div>
        <div class="mc-dot-grid mc-dot-grid-bottom"></div>

        <svg class="mc-bg-pitch" viewBox="0 0 720 430">
          <rect x="20" y="20" width="680" height="390"></rect>
          <line x1="360" y1="20" x2="360" y2="410"></line>
          <circle cx="360" cy="215" r="58"></circle>
          <circle cx="360" cy="215" r="3"></circle>
          <rect x="20" y="135" width="95" height="160"></rect>
          <rect x="605" y="135" width="95" height="160"></rect>
          <rect x="20" y="175" width="38" height="80"></rect>
          <rect x="662" y="175" width="38" height="80"></rect>
        </svg>
      </div>

      <header class="mc-header">
        <div>
          <p class="mc-kicker">Comparativo estatístico</p>

          <h1 class="mc-title">
            <span id="homeTitle">França</span>
            <span class="mc-versus">×</span>
            <span id="awayTitle">Marrocos</span>
          </h1>

          <p id="matchSubtitle" class="mc-subtitle">
            Quartas de final • Copa do Mundo 2026
          </p>
        </div>

        <div class="mc-index">
          <span>ADQL UI</span>
          <strong id="comparisonVersion">V3.0</strong>
        </div>
      </header>

      <section class="mc-team-row">
        <span id="homeTeamLabel">França</span>
        <span>Dados comparativos</span>
        <span id="awayTeamLabel">Marrocos</span>
      </section>

      <section id="comparisonMetrics" class="mc-metrics"></section>

      <footer class="mc-footer">
        <div>
          <strong>Fonte</strong>
          <span id="sourceText">FIFA • FBref • Dados próprios</span>
        </div>

        <div class="mc-footer-brand">
          <strong>Além das quatro linhas</strong>
          <span>Henrique Carvalho</span>
        </div>
      </footer>

      <div class="mc-wave" aria-hidden="true"></div>
      <div class="mc-wave-dots" aria-hidden="true"></div>

    </section>
  </main>

  <script src="../data/france-morocco-comparison.js"></script>
  <script src="../js/match-comparison.js"></script>
</body>
</html>
