<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADQL UI</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

    background:#0D0D0D;
    color:#F4F4F4;

    font-family:Arial, Helvetica, sans-serif;

    margin:0;
    padding:80px;

}

.container{

    max-width:900px;
    margin:auto;

}

.badge{

    display:inline-block;

    background:#F2B705;

    color:#111;

    padding:6px 14px;

    border-radius:30px;

    font-weight:bold;

    font-size:14px;

}

h1{

    font-size:60px;
    margin:20px 0 10px;

}

h2{

    color:#A8A8A8;
    font-weight:400;

}

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-top:60px;

}

.card{

    background:#171717;

    border:1px solid #2A2A2A;

    border-radius:16px;

    padding:25px;

}

.card h3{

    margin-top:0;

}

.footer{

    margin-top:80px;

    color:#777;

}

</style>

</head>

<body>

<div class="container">

<span class="badge">

ADQL UI v1.0

</span>

<h1>

Além das quatro linhas

</h1>

<h2>

Football Analytics Components

</h2>

<div class="cards">

<div class="card">

<h3>🎴 Hero</h3>

<p>Em desenvolvimento</p>

</div>

<div class="card">

<h3>📊 Dashboard</h3>

<p>Em desenvolvimento</p>

</div>

<div class="card">

<h3>👤 Player Card</h3>

<p>Em desenvolvimento</p>

</div>

<div class="card">

<h3>📈 Timeline</h3>

<p>Em desenvolvimento</p>

</div>

</div>

<div class="footer">

Henrique Carvalho • Além das quatro linhas

</div>

</div>

</body>

</html>
